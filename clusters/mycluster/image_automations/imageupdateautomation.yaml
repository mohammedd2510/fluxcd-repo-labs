apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: react-app-cicd
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxcdbot
        email: fluxcdbot@users.noreply.github.com
      messageTemplate: "chore: update react-app-cicd image to {{.AutomationObject.Namespace}}/{{.AutomationObject.Name}}"
    push:
      branch: main
  update:
    path: ./apps/react-app/
    strategy: Setters
