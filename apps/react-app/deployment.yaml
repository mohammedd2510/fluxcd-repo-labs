apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-demo
  namespace: default
  labels:
    app: route-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: route-demo
  template:
    metadata:
      labels:
        app: route-demo
    spec:
      containers:
        - name: route-demo
          image: ghcr.io/mohammedd2510/react-app-cicd:0.0.2 # {"$imagepolicy": "flux-system:react-app-cicd"}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 256Mi
